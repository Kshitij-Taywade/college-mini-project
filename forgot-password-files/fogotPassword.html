<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Secure Account Recovery</title>
    <meta name="description" content="Forgot your password? Recover your account securely by requesting a password reset link via email." />
    <meta name="keywords" content="forgot password, reset password, account recovery, secure login, password reset" />
    <meta name="author" content="Kshitij Taywade" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Forgot Password | Secure Account Recovery" />
    <meta property="og:description" content="Recover your account securely by requesting a password reset link." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" />

    <!-- CSS -->
    <link rel="stylesheet" href="fogotPassword.css" />
</head>

<body>
    <main class="container">
        <section class="card" aria-labelledby="forgot-title">
            <h1 id="forgot-title">Forgot Password</h1>
            <p class="subtitle">
                Enter your registered email address to receive a password reset link.
            </p>

            <form id="forgotForm" aria-label="Forgot Password Form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email" aria-required="true" />
                </div>

                <button type="submit" aria-label="Send password reset link">
            Send Reset Link
          </button>
            </form>

            <nav class="footer-text">
                <a href="login.html" aria-label="Back to login page">Back to Login</a>
            </nav>
        </section>
    </main>

    <!-- JS -->
    <script src="fogotPassword.js" defer></script>
</body>

</html>
